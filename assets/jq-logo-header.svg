<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 160" role="img" aria-labelledby="title desc">
  <title id="title">Jose Quesada Data Engineering and Analytics</title>
  <desc id="desc">Readable transparent logo for Jose Quesada</desc>
  <defs>
    <style>
      .primary{fill:#f7fbff}
      .secondary{fill:#dbe7f3}
      .accent{fill:#52d5ff}
      .line{stroke:#52d5ff;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;fill:none}
      .divider{stroke:#52d5ff;stroke-width:2.5;opacity:.95}
    </style>
  </defs>

  <g transform="translate(8 18)">
    <text x="0" y="90" class="primary" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="88" font-weight="850" letter-spacing="-8">JQ</text>
    <polyline class="line" points="108,70 122,58 139,63 156,47"/>
    <circle cx="108" cy="70" r="5.2" class="accent"/>
    <circle cx="122" cy="58" r="5.2" class="accent"/>
    <circle cx="139" cy="63" r="5.2" class="accent"/>
    <circle cx="156" cy="47" r="5.2" class="accent"/>
  </g>

  <line x1="214" y1="32" x2="214" y2="126" class="divider"/>

  <text x="242" y="73" class="primary" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="49" font-weight="790" letter-spacing="-1.6">Jose Quesada</text>
  <text x="244" y="115" class="secondary" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="760" letter-spacing="3.2">DATA ENGINEERING</text>
  <text x="525" y="115" class="accent" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="820" letter-spacing="3.2">&amp; ANALYTICS</text>
</svg>
